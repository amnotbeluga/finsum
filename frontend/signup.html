<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Finserv India</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f5fa 0%, #e6ecf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .back-link {
            margin-bottom: 20px;
            display: block;
            color: #1b6ef3;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link i {
            margin-right: 8px;
        }
        .signup-panel {
            background: white;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .signup-panel h3 {
            font-size: 32px;
            margin-bottom: 12px;
            color: #1a2639;
        }
        .free-trial {
            display: inline-block;
            background: #e9eef3;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #4a5a72;
        }
        .input-group input {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid #dde4ec;
            border-radius: 20px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: #1b6ef3;
            box-shadow: 0 0 0 4px rgba(27,110,243,0.1);
        }
        .btn {
            width: 100%;
            background: #1b6ef3;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .btn:hover {
            background: #0e5ad2;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(27,110,243,0.3);
        }
        .btn-outline {
            width: 100%;
            background: white;
            border: 2px solid #e1e8f0;
            color: #1a2639;
            padding: 16px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-outline:hover {
            border-color: #1b6ef3;
            background: #f8fafd;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
            color: #8a9bb5;
            font-size: 12px;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: #e1e8f0;
        }
        .terms-check {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            font-size: 14px;
            color: #4a5a72;
        }
        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #5a6d86;
        }
        .footer-links a {
            color: #1b6ef3;
            text-decoration: none;
            font-weight: 500;
        }
        .alert {
            display: none;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        
        <div id="alertContainer" class="alert"></div>
        
        <div class="signup-panel">
            <h3>Create an account</h3>
            <span class="free-trial">
                <i class="far fa-calendar-alt"></i> Start your 14-day free trial
            </span>

            <form id="signupForm">
                <div class="row-2col">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="Arjun Sharma" required>
                    </div>
                    <div class="input-group">
                        <label>Phone (Optional)</label>
                        <input type="text" id="phone" placeholder="+91 98765 43210">
                    </div>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="arjun@investor.in" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                <div class="terms-check">
                    <input type="checkbox" id="termsCheck" required>
                    <span>I agree to the Terms of Service and Privacy Policy</span>
                </div>
                <button type="submit" class="btn" id="signupBtn">
                    Create My Account <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="divider">
                <span class="divider-line"></span> OR CONTINUE WITH <span class="divider-line"></span>
            </div>

            <!-- Configure your Google Client ID here -->
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID"
                 data-context="signup"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>

            <div style="display:flex; justify-content:center;">
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="pill"
                     data-theme="outline"
                     data-text="signup_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>

            <div class="footer-links">
                <span>Already have an account? <a href="/signin">Sign In</a></span>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        async function handleCredentialResponse(response) {
            showAlert('Authenticating with Google...', 'success');
            
            try {
                const result = await window.auth.googleSignin(response.credential);
                
                if (result.success) {
                    showAlert('Google login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showAlert(result.message || 'Google login failed', 'error');
                }
            } catch (error) {
                showAlert('An error occurred during Google sign in.', 'error');
            }
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alertContainer');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('signupBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            btn.disabled = true;

            try {
                const userData = {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    fullName: document.getElementById('fullName').value
                };
                
                const phoneInput = document.getElementById('phone');
                if (phoneInput && phoneInput.value) {
                    userData.phone = phoneInput.value;
                }
                
                const result = await window.auth.signup(userData);

                if (result.success) {
                    showAlert('Account created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showAlert(result.message || 'Signup failed', 'error');
                }
            } catch (error) {
                console.error('Signup error:', error);
                showAlert('An error occurred. Please try again.', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        if (window.auth.isAuthenticated()) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
